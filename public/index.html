<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Películas en 2025</title>
    <style>
        /* Reset básico */
        * { box-sizing: border-box; margin: 0; padding: 0;}

        /* Paleta de colores */
        :root {
            --bg-fondo: #14181C;
            --bg-tarjeta: #2C3440;
            --texto-principal: #FFFFFF;
            --texto-secundario: #9ab;
            --verde-let: #00E054;
            --oro-imdb: #F5C518;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-fondo);
            color: var(--texto-principal);
        }

        /* Barra de navegación superior */
        .navbar {
            background-color: var(--bg-tarjeta);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgb(0,0,0,0.3);
        }

        .nav-logo a {
            display: flex;
            align-items: center;
        }

        .logo-letterboxd {
            height: 40px;
            width: auto;
            max-width: 100%;
            transition: transform 0.2 ease;
        }

        .logo-letterboxd:hover {
            transform: scale(1.1);
        }

        .nav-titulo h1 {
            font-size: 26px;
            color: var(--texto-principal);
            text-align: center;
            margin: 0;
        }

        .nav-enlaces a {
            text-decoration: none;
        }

        .btn-nav {
            background-color: var(--bg-fondo);
            color: var(--texto-principal);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-nav:hover {
            background-color: #60A5FA;
            color: #0F172A;
            border-color: #60A5FA;
        }

        /* Buscador y estadísticas */
        .controles {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .buscador {
            padding: 12px 20px;
            border-radius: 6px;
            border: 1px solid transparent;
            background-color: var(--bg-tarjeta);
            color: white;
            width: 350px;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }

        .buscador:focus {
            border: 1px solid var(--verde-let);
            box-shadow: 0 0 8px rgba(0, 224, 84, 0.3);
        }

        .stats-bar strong {
            color: var(--oro-imdb);
            font-size: 16px;
        }

        /* Cuadrícula de películas */
        .contenedor-peliculas {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto 50px auto;
            padding: 0 20px;
        }

        /* Diseño de cada película */
        .tarjeta {
            background-color: var(--bg-tarjeta);
            border-radius: 12px;
            overflow: hidden; /* Hace que la imagen respete el borde curvo. */
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .tarjeta:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
        }

        .tarjeta img {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            object-position: center;
        }

        .tarjeta-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tarjeta h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--texto-principal);
            /* Divide el texto a 2 líneas si es muy largo */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Contenedor de la nota con estrellas */
        .nota-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            color: var(--texto-secundario);
            font-weight: bold;
        }

        .estrella { 
            color: var(--oro-imdb);
            font-size: 1px;
        }

        .nota-actual {
            color: var(--texto-principal);
        }

        /* Footer de Copyright */
        footer {
            text-align: center;
            padding: 30px;
            color: var(--texto-secundario);
            font-size: 13px;
            border-top: 1px solid #1E293B;
            margin-top: 40px;
        }

        /* Responsive */

        /* Pantallas medianas */
        @media (max-width: 1024px) {
            .contenedor-peliculas {
                grid-template-columns: repeat(3, 1fr); /* Se baja a 3 carteles por fila */
            }
        }

        /* Pantallas pequeñas */
        @media (max-width: 768px) {
            .contenedor-peliculas {
                grid-template-columns: repeat(2, 1fr); /* Se baja a 2 carteles por fila */
            }

            /* Apila el buscador y estadísticas */
            .controles {
                flex-direction: column;
                gap: 15px;
            }

            .buscador {
                width: 100%; /* El buscador ocupa todo el ancho de la pantalla */
            }

            /* Título de la barra algo más pequeño */
            .nav-titulo h1 { font-size: 20px;}
        }

        /* Pantallas más pequeñas */
        @media (max-width: 480px) {
            .contenedor-peliculas {
                grid-template-columns: 1fr;
            }

            /* Apila la navbar entera */
            .navbar {
                flex-direction: column;
                gap: 12px;
                padding: 15px;
            }
        }

        /* Estilo para la Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
        }

        .modal-contenido {
            background: #1e293b;
            margin: 10% auto;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            border: 1px solid #334155;
        }

        .cerrar {
            float: right;
            cursor: pointer;
            font-size: 24px;
            color: #94a3b8;
        }

        #form-pelicula input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        .btn-guardar {
            width: 100%;
            padding: 12px;
            background: #60a5fa;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Botones dentro de la tarjeta */
        .acciones-tarjeta {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-borrar {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-editar {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }


        

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">
            <a href="https://letterboxd.com/Diiegoraposo/" target="_blank" title="Mi Letterbox">
                <img src="imagenes/letterboxd-mac-icon.png" alt="Logo Letterboxd" class="logo-letterboxd">
            </a>
        </div>

        <div class="nav-titulo">
            <h1>Mi<span>Catálogo</span> de Cine</h1>
        </div>

        <div class="nav-enlaces">
            <a href="https://www.imdb.com/es-es/chart/top/?ref_=hm_nv_menu" class="btn-nav">Top 250</a>
        </div>
    </nav>

    <div class="controles">
        <input type="text" id="input-busqueda" class="buscador" placeholder="Buscar por director">

        <div id="stats-container" class="stats-bar">
            Cargando estadísticas..
        </div>
    </div>

    <div class="contenedor-peliculas" id="lista-peliculas"></div>

    <div class="contenedor-peliculas" id="lista-peliculas"></div>

    <div class="nav-enlaces">
        <button id="btn-abrir-form" class="btn-nav">+ Añadir Película</button>
    </div>

    <div id="modal-pelicula" class="modal">
        <div class="modal-contenido">
            <span class="cerrar">&times;</span>
            <h2 id="modal-titulo">Nueva Pelicula</h2>
            <form id="form-pelicula">
                <input type="hidden" id="peli-id"> <input type="text" id="titulo" placeholder="Título" required>
                <input type="text" id="director" placeholder="Director" required>
                <input type="number" id="año" placeholder="Año" required>
                <input type="number" step="0.1" id="nota_imdb" placeholder="Nota IMDB" required>
                <input type="text" id="imagen" placeholder="URL de la Imagen (Opcional)">
                <button type="submit" class="btn-guardar">Guardar Película</button>
            </form>
        </div>
    </div>

    <footer>
        @ 2026 - Trabajo Final Lenguaje de Marcas - Diego Raposo Alvarez.
    </footer>
    
    <script src="app.js"></script>
</body>
</html>
